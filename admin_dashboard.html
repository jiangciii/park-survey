<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>问卷后台</title>
  <link rel="stylesheet" href="/static/admin_app.css" />
</head>
<body>
  <main class="page">
    <section class="panel hero">
      <div>
        <span class="eyebrow">Research Admin</span>
        <h1>研究问卷后台</h1>
        <p>查看提交情况、核查答卷详情，并导出适合后续学术分析的数据文件。</p>
      </div>
      <div class="hero-actions">
        <button class="button secondary" id="refreshButton">刷新数据</button>
        <a class="button primary" href="/survey">查看前台问卷</a>
        <button class="button ghost" id="logoutButton">退出登录</button>
      </div>
    </section>

    <section class="section stats-grid" id="statsGrid"></section>

    <section class="section panel toolbar">
      <div class="toolbar-left">
        <div class="segmented" id="statusFilter">
          <button class="segment active" data-status="all" type="button">全部</button>
          <button class="segment" data-status="completed" type="button">已完成</button>
          <button class="segment" data-status="incomplete" type="button">未完成</button>
        </div>
        <input class="search" id="searchInput" placeholder="搜索答卷编号或完成码" />
      </div>
      <div class="toolbar-right">
        <a class="button secondary" href="/api/admin/export/respondents.csv">导出 respondents.csv</a>
        <a class="button secondary" href="/api/admin/export/ce_choices.csv">导出 ce_choices.csv</a>
      </div>
    </section>

    <section class="section panel table-card">
      <div class="table-title">答卷列表</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>答卷编号</th>
              <th>完成码</th>
              <th>提交时间</th>
              <th>作答状态</th>
              <th>作答时长</th>
              <th>常去公园</th>
              <th>联想对象</th>
              <th>CE完成情况</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="responsesBody"></tbody>
        </table>
      </div>
      <div class="empty" id="emptyState" hidden>暂无答卷数据</div>
    </section>
  </main>
  <script src="/static/admin_dashboard.js"></script>
</body>
</html>
