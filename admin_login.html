<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理员登录</title>
  <link rel="stylesheet" href="/static/admin_app.css" />
</head>
<body>
  <main class="page login-shell">
    <section class="panel login-card">
      <span class="eyebrow">Admin Login</span>
      <h1 style="margin-top:14px;">研究问卷后台登录</h1>
      <p style="margin-top:8px; color: var(--muted); line-height: 1.7;">仅管理员可查看答卷统计、详情与导出数据。请输入后台凭证后继续。</p>
      <form id="loginForm">
        <div class="error" id="runtimeHint"></div>
        <div class="field">
          <label for="username">管理员账号</label>
          <input id="username" name="username" autocomplete="username" placeholder="请输入管理员账号" required />
        </div>
        <div class="field">
          <label for="password">管理员密码</label>
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="请输入管理员密码" required />
        </div>
        <div class="error" id="loginError"></div>
        <button class="button primary" style="width:100%; margin-top: 10px;" type="submit">进入后台</button>
      </form>
    </section>
  </main>
  <script src="/static/admin_login.js"></script>
</body>
</html>
