<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>答卷详情</title>
  <link rel="stylesheet" href="/static/admin_app.css" />
</head>
<body>
  <main class="page">
    <section class="panel hero">
      <div>
        <span class="eyebrow">Response Detail</span>
        <h1 id="detailTitle">答卷详情</h1>
        <p>按问卷部分查看普通题答案与 CE 选择记录，便于后续核查、统计与导出。</p>
      </div>
      <div class="hero-actions">
        <a class="button secondary" href="/admin/dashboard">返回后台首页</a>
      </div>
    </section>

    <section class="section detail-grid">
      <aside class="panel meta-card">
        <h2 style="margin:0 0 16px;">基本信息</h2>
        <div class="meta-list" id="metaList"></div>
      </aside>

      <div>
        <section class="panel detail-card">
          <h2 style="margin:0 0 18px;">普通问卷答案</h2>
          <div id="answerSections"></div>
        </section>

        <section class="section panel detail-card">
          <h2 style="margin:0 0 18px;">CE 选择记录</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>任务</th>
                  <th>A 方案</th>
                  <th>B 方案</th>
                  <th>最终选择</th>
                  <th>耗时</th>
                </tr>
              </thead>
              <tbody id="ceBody"></tbody>
            </table>
          </div>
        </section>
      </div>
    </section>
  </main>
  <script src="/static/admin_response.js"></script>
</body>
</html>
